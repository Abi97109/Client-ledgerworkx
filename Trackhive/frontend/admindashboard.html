<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackHive |Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.ico" />
  <style>
    :root {
      --primary-color: #74b0f4;
      --accent-color: #3b82f6;
      --accent-light: #60a5fa;
      --bg-primary: #0f172a; /* dark background */
      --bg-secondary: #1e293b;
      --text-primary: #3b82f6;
      --text-secondary: #94a3b8;
      --border-color: #334155;
      --shadow-light: rgba(0, 0, 0, 0.1);
      --shadow-medium: rgba(0, 0, 0, 0.15);
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --danger-color: #ef4444;
    }
    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #3b82f6;
      --text-secondary: #94a3b8;
      --border-color: #334155;
    }
    [data-theme="light"] {
      --bg-primary: #e7f1ff;
      --bg-secondary: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #2563eb;
      --border-color: #cbd5e1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
      animation: fadeIn 1.2s ease forwards;
      min-height: 100vh;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(25px);} to { opacity: 1; transform: translateY(0);} }
    .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;}
    .floating-shape { position: absolute; border-radius: 50%; opacity: 0.1; animation: float 15s infinite ease-in-out;}
    .shape-1 { width: 200px; height: 200px; background: linear-gradient(45deg, var(--accent-color), var(--accent-light)); top: 10%; left: 5%; animation-delay: 0s;}
    .shape-2 { width: 150px; height: 150px; background: linear-gradient(45deg, var(--primary-color), var(--accent-color)); top: 60%; right: 10%; animation-delay: 5s;}
    .shape-3 { width: 100px; height: 100px; background: linear-gradient(45deg, var(--accent-light), var(--accent-color)); bottom: 20%; left: 15%; animation-delay: 10s;}
    @keyframes float { 0%,100%{transform:translateY(0)rotate(0deg);} 33%{transform:translateY(-30px)rotate(120deg);} 66%{transform:translateY(15px)rotate(240deg);} }
    .header { display:flex; justify-content:space-between; align-items:center; padding:1rem 2rem; background:var(--bg-secondary); box-shadow:0 2px 10px var(--shadow-light); position:sticky; top:0; z-index:100; backdrop-filter:blur(10px);}
    .header-left { display:flex; align-items:center; gap:1rem;}
    .logo-img {width:40px; height:40px; border-radius:10px; object-fit:cover;}
    .logo { display:flex; align-items:center; gap:0.5rem; font-size:1.5rem; font-weight:700; color:var(--primary-color);}
    .header-right {display:flex; align-items:center; gap:1rem;}
    .theme-toggle {
      position: relative;
      width: 60px; height:30px; background:var(--border-color);
      border-radius:15px; cursor:pointer; border:none; outline:none;
    }
    .theme-toggle::before {
      content: attr(data-symbol);
      position:absolute;top:3px;left:3px;width:24px;height:24px;background:white;
      border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.3s; box-shadow:0 2px 5px var(--shadow-light);
    }
    .logout-btn { padding:0.5rem 1rem; background:linear-gradient(135deg, var(--danger-color), #dc2626); color:white; border:none; border-radius:8px; cursor:pointer;font-weight:500;transition:all 0.3s;}
    .logout-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(239,68,68,0.3);}
    .hamburger { width: 40px; height: 40px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; border-radius: 8px; padding: 8px;}
    .hamburger:hover { background:var(--accent-color); transform:scale(1.1);}
    .hamburger span { width:24px; height:3px; background:var(--text-primary); border-radius:2px; transition:all 0.3s;}
    .hamburger:hover span { background:white;}
    .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px);}
    .hamburger.active span:nth-child(2) { opacity:0;}
    .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(7px,-6px);}
    .sidebar { position:fixed;top:0;left:-300px;width:300px;height:100vh;background:var(--bg-secondary); box-shadow:2px 0 20px var(--shadow-medium); transition:all 0.3s cubic-bezier(0.4,0,0.2,1); z-index:200;padding:2rem 0;}
    .sidebar.active { left:0;}
    .sidebar-overlay { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);opacity:0;visibility:hidden;transition:all 0.3s;z-index:150;}
    .sidebar-overlay.active {opacity:1;visibility:visible;}
    .sidebar-header {padding:0 2rem 2rem;border-bottom:1px solid var(--border-color);margin-bottom:2rem;}
    .sidebar-title {font-size:1.25rem;font-weight:600;color:var(--text-primary);}
    .sidebar-menu {list-style:none;}
    .sidebar-item {margin:0.5rem 0;}
    .sidebar-link {display:flex;align-items:center;gap:1rem;padding:1rem 2rem;color:var(--text-secondary);text-decoration:none;transition:all 0.3s;position:relative;}
    .sidebar-link:hover { background:var(--accent-color); color:white; transform:translateX(10px);}
    .sidebar-link::before {content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--accent-color);transform:scaleY(0);transition:transform 0.3s;}
    .sidebar-link:hover::before {transform:scaleY(1);}
    .main-content {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: all 0.3s;
    }
    .welcome-section {
      text-align: center;
      margin-bottom: 3rem;
      width: 100%;
      max-width: 760px;
    }
    .welcome-title { font-size:3rem; font-weight:700; margin-bottom:0.5rem; color:var(--primary-color);}
    .welcome-subtitle { font-size:1.5rem; color:var(--text-secondary);}
    .stats-bar {
      display: flex; justify-content: center; gap: 3rem;
      margin-top: 2rem; margin-bottom: 2.6rem; width:100%; max-width:765px;
    }
    .stat-item {
      text-align: center; padding: 2rem; background: var(--bg-secondary); border-radius: 28px;
      min-width: 180px; cursor: default; user-select: none; color: var(--primary-color); font-weight: 700; font-size:1.8rem; box-shadow: none; border:2px solid var(--border-color);
    }
    .stat-item:hover {background:var(--accent-light); color:white; box-shadow:none; transform:none;}
    .stat-number { font-size: 3.3rem; font-weight:800; color:var(--accent-color);}
    .stat-label { font-size:1.4rem; color:var(--text-secondary); margin-top:0.3rem;}
    .info-boxes {
    display: flex;
    gap: 2rem;
    justify-content: center;
    align-items: center;
    flex-wrap: nowrap; 
    }

    .info-box {
      background: var(--bg-secondary); border-radius: 28px; border: 2px solid var(--border-color); width: 380px; height: 180px; max-width: 98vw; min-width: 240px; display: flex;
      align-items: center; justify-content: center; font-weight: 600; font-size: 1.6rem; color: var(--primary-color); text-align: center; cursor: pointer; user-select: none; box-shadow: none; transition: background 0.3s, border 0.3s, color 0.3s; outline: none;
    }
    .info-box:focus, .info-box:hover {
      border:2px solid var(--accent-color); background:var(--accent-light); color:white;
    }
    @media (max-width:950px) {
      .stats-bar, .info-boxes {flex-direction:column;gap:1.6rem;}
      .info-box {width:96vw;max-width:none;}
      .welcome-title{font-size:2.3rem;}
    }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header"><h3 class="sidebar-title">Menu</h3></div>
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="admindashboard.html" class="sidebar-link active"><span>📋</span> Dashboard</a>
      </li>
      <li class="sidebar-item">
        <a href="adminsettings.html" class="sidebar-link"><span>⚙</span> Settings</a>
      </li>
      <li class="sidebar-item">
        <a href="adminnotification.html" class="sidebar-link"><span>🔔</span> Notifications</a>
      </li>
      <li class="sidebar-item">
        <a href="adminhelp.html" class="sidebar-link"><span>❓</span> Help & Support</a>
      </li>
    </ul>
  </nav>
  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
      <div class="logo">
        <img src="./logotrackhive.jpg" alt="TrackHive Logo" class="logo-img" />
        <span>TrackHive</span>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" data-symbol="🌙"></button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>
  <!-- Centered Main Content -->
  <main class="main-content">
    <section class="welcome-section">
      <h1 class="welcome-title">Welcome back, Admin!</h1>
      <p class="welcome-subtitle">Manage &amp; Monitor your classrooms in real-time</p>
    </section>
    <section class="stats-bar" aria-label="Summary cubes">
      <div class="stat-item" tabindex="0" aria-label="Total Rooms Count">
        <div class="stat-number" id="totalRooms">0</div>
        <div class="stat-label">Rooms</div>
      </div>
      <div class="stat-item" tabindex="0" aria-label="Vacant Rooms Count">
        <div class="stat-number" id="vacantRooms">0</div>
        <div class="stat-label">Vacant</div>
      </div>
      <div class="stat-item" tabindex="0" aria-label="Occupied Rooms Count">
        <div class="stat-number" id="occupiedRooms">0</div>
        <div class="stat-label">Occupied</div>
      </div>
    </section>
    <section class="info-boxes" aria-label="Navigation cubes">
      <div class="info-box" tabindex="0" role="button" aria-label="Classroom Information" onclick="window.location.href='classroominfo.html'">Classroom Information</div>
      <div class="info-box" tabindex="0" role="button" aria-label="User Information" onclick="window.location.href='userinformation.html'">User Information</div>
    </section>
  </main>
  <script>
    // Sidebar/hamburger/menu/animation logic unchanged
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    // Initial theme
    let theme = localStorage.getItem('theme') || 'dark';
    setTheme(theme);
    function setTheme(th){
      if(th === 'dark'){
        body.setAttribute('data-theme','dark');
        themeToggle.setAttribute('data-symbol','☀');
      } else {
        body.setAttribute('data-theme','light');
        themeToggle.setAttribute('data-symbol','🌙');
      }
    }
    themeToggle.addEventListener('click', () => {
      theme = (body.getAttribute('data-theme') === 'dark') ? 'light':'dark';
      setTheme(theme);
      localStorage.setItem('theme',theme);
    });
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    function toggleSidebar() {
      hamburger.classList.toggle('active');
      sidebar.classList.toggle('active');
      sidebarOverlay.classList.toggle('active');
    }
    hamburger.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.addEventListener('click', () => toggleSidebar());
    });
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        document.body.style.opacity = '0';
        setTimeout(() => { window.location.href = '../backend/logout.php'; }, 500);
      }
    }
  async function loadClassroomStats() {
  try {
    const res = await fetch("../backend/adminclassroom.php"); // adjust path if needed
    const data = await res.json();

    if (!Array.isArray(data)) {
      console.error("Invalid response:", data);
      return;
    }

    // Calculate statistics
    const totalRooms = data.length;
    const occupiedRooms = data.filter(c => Number(c.class_capacity) > 0).length;
    const vacantRooms = data.filter(c => Number(c.class_capacity) === 0).length;

    // Update dashboard
    document.getElementById("totalRooms").textContent = totalRooms;
    document.getElementById("occupiedRooms").textContent = occupiedRooms;
    document.getElementById("vacantRooms").textContent = vacantRooms;

  } catch (err) {
    console.error("Error loading classroom stats:", err);
  }
}

// Load immediately and refresh every 10 seconds
loadClassroomStats();
setInterval(loadClassroomStats, 500);


  </script>
</body>
</html>
