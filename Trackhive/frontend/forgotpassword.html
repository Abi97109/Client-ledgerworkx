<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TrackHive | Forgot Password</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/png" href="favicon.ico">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body {
                background: #f7f9fb;
                color: #222;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                overflow-x: hidden;
                position: relative;
            }

            /* Navbar */
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 18px 60px;
                background: #243B55;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                position: sticky;
                top: 0;
                z-index: 200;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .logo img {
                height: 50px;
                border-radius: 8px;
            }

            .logo a {
                color: #fff;
                font-size: 1.3rem;
                font-weight: 700;
                text-decoration: none;
            }

            nav a {
                margin: 0 15px;
                text-decoration: none;
                color: #f1f1f1;
                font-weight: 500;
                transition: 0.3s;
            }

            nav a:hover {
                color: #fff;
                transform: translateY(-2px);
            }

            /* Floating shapes */
            .floating-shapes {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 0;
            }

            .shape {
                position: absolute;
                border-radius: 50%;
                opacity: 0.3;
            }

            .shape1 {
                width: 120px;
                height: 120px;
                background: linear-gradient(45deg, #3b82f6, #60a5fa);
                top: 20%;
                left: 10%;
                animation: floatRotate 12s infinite ease-in-out;
            }

            .shape2 {
                width: 80px;
                height: 80px;
                background: linear-gradient(45deg, #8b5cf6, #a78bfa);
                top: 60%;
                right: 15%;
                animation: floatBounce 15s infinite ease-in-out 2s;
            }

            .shape3 {
                width: 200px;
                height: 200px;
                background: linear-gradient(45deg, #10b981, #34d399);
                bottom: 30%;
                left: 5%;
                animation: morphFloat 18s infinite ease-in-out 1s;
                border-radius: 30% 70% 70% 30%;
            }

            .shape4 {
                width: 80px;
                height: 80px;
                background: linear-gradient(45deg, #f59e0b, #fbbf24);
                top: 30%;
                right: 5%;
                animation: pulse 4s infinite ease-in-out;
            }

            /* Forgot password container */
            .page-container {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1;
                padding: 40px 20px;
            }

            .forgot-box {
                width: 400px;
                background: #fff;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
                text-align: center;
                animation: fadeInUp 1s ease both;
            }

            .forgot-box h2 {
                color: #243B55;
                margin-bottom: 15px;
            }

            .forgot-box p {
                margin-bottom: 20px;
                font-size: 14px;
                color: #444;
            }

            input {
                width: 100%;
                padding: 12px;
                margin: 10px 0;
                border: none;
                border-radius: 10px;
                background: #f0f0f0;
            }

            button {
                padding: 12px 30px;
                border-radius: 20px;
                border: none;
                background: #243B55;
                color: #fff;
                font-weight: 600;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #3b82f6;
                transform: scale(1.05);
            }

            .message {
                margin-top: 15px;
                font-size: 14px;
                color: red;
            }

            /* Footer */
            footer {
                text-align: center;
                padding: 30px 20px;
                background: linear-gradient(135deg, #1f2937, #111827);
                color: #d1d5db;
                margin-top: auto;
            }

            footer small {
                opacity: 0.7;
                margin-top: 5px;
                display: inline-block;
            }

            /* Animations */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes floatRotate {

                0%,
                100% {
                    transform: translateY(0) rotate(0);
                }

                50% {
                    transform: translateY(-30px) rotate(180deg);
                }
            }

            @keyframes floatBounce {

                0%,
                100% {
                    transform: translateY(0);
                }

                50% {
                    transform: translateY(-40px);
                }
            }

            @keyframes morphFloat {

                0%,
                100% {
                    border-radius: 30% 70% 70% 30%;
                    transform: translateY(0);
                }

                50% {
                    border-radius: 50%;
                    transform: translateY(-40px);
                }
            }

            @keyframes pulse {

                0%,
                100% {
                    transform: scale(1);
                    opacity: 0.08;
                }

                50% {
                    transform: scale(1.3);
                    opacity: 0.15;
                }
            }
        </style>
    </head>

    <body>

        <header>
            <div class="logo">
                <img src="logotrackhive.jpg" alt="TrackHive Logo">
                <a href="openinghomepg.html">TrackHive</a>
            </div>
            <nav>
                <a href="openinghomepg.html">Home</a>
                <a href="About.html">About</a>
                <a href="contactus.html">Contact</a>
            </nav>
        </header>

        <!-- Floating Shapes -->
        <div class="floating-shapes">
            <div class="shape shape1"></div>
            <div class="shape shape2"></div>
            <div class="shape shape3"></div>
            <div class="shape shape4"></div>
        </div>

        <!-- Forgot Password -->
        <div class="page-container">
            <div class="forgot-box">
                <h2>Forgot Password</h2>
                <p>Enter your registered email to reset your password.</p>

                <form action="../backend/forgotpassword.php" method="POST">
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <button type="submit" name="check_email">Check Email</button>
                </form>
                <div class="message" id="message"></div>



            </div>
        </div>

        <!-- Footer -->
        <footer>
            © 2025 TrackHive. All Rights Reserved.
            <br>
            <small>Building the future of smart education, one classroom at a time.</small>
        </footer>

    </body>

</html>

        <script>
            // Simple client-side toggling (optional)
            const verifyForm = document.getElementById('verify-email-form');
            const resetForm = document.getElementById('reset-password-form');
            const messageDiv = document.getElementById('message');

            // Example: Show password form if redirected with query param
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('show') === 'password') {
                verifyForm.style.display = 'none';
                resetForm.style.display = 'block';
            }
            if (urlParams.get('msg')) {
                messageDiv.textContent = decodeURIComponent(urlParams.get('msg'));
            }
            
        </script>
    </body>

</html>
